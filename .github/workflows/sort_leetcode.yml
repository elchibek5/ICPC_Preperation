name: Auto Sort LeetCode Files
on:
  workflow_dispatch:

jobs:
  sort_and_rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create Python Script
        run: |
          cat << 'EOF' > run_sort.py
          import os
          import re

          # All lowercase, no spaces or symbols for bulletproof matching
          problem_mapping = {
              "mergeksortedlists": 23,
              "sudokusolver": 37,
              "trappingrainwater": 42,
              "nqueens": 51,
              "largestrectangleinhistogram": 84,
              "slidingwindowmaximum": 239,
              "findmedianfromdatastream": 295,
              "shortestsubarraywithsumatleastk": 862,
              "verticalordertraversalbinarytree": 987,
              "addtwonumbers": 2,
              "binarytreezigzaglevelordertraversal": 103,
              "binarytreelevelordertraversal": 102,
              "binarytreelevelordertraversal2": 107,
              "binarytreerightsideview": 199,
              "capacitytoshippackageswithinddays": 1011,
              "combinations": 77,
              "containerwithmostwater": 11
          }

          target_dir = "LeetCode_Problems/Java"
          print(f"Scanning directory: {target_dir}\n" + "-"*40)

          if not os.path.exists(target_dir):
              print(f"ERROR: Directory '{target_dir}' not found in the repository!")
              exit(0)

          changes_made = 0

          for root, dirs, files in os.walk(target_dir):
              for filename in files:
                  if not filename.endswith(".java"):
                      continue

                  filepath = os.path.join(root, filename)
                  base_name = os.path.splitext(filename)[0]
                  
                  # Normalize string for lookup (lowercase, remove all spaces and symbols)
                  normalized_base = re.sub(r'[^a-zA-Z0-9]', '', base_name).lower()
                  
                  prob_num = None
                  
                  # 1. Check the lookup table FIRST
                  if normalized_base in problem_mapping:
                      prob_num = str(problem_mapping[normalized_base]).zfill(4)
                      
                  # 2. Extract number from filename if not in mapping
                  if not prob_num:
                      # Find any standalone number up to 4 digits
                      match = re.search(r'(?:^|\D)(\d{1,4})(?=\D|$)', base_name)
                      if match:
                          prob_num = match.group(1).zfill(4)
                  
                  # 3. Clean up the text title
                  clean_title = base_name
                  
                  # Remove the extracted number from the title
                  if prob_num:
                      clean_title = re.sub(rf'\b{int(prob_num)}\b', '', clean_title)
                      clean_title = re.sub(rf'\b{prob_num}\b', '', clean_title)
                  
                  # Strip out LeetCode garbage words
                  garbage = ["Code", "Testcase", "Test", "Result"]
                  for g in garbage:
                      clean_title = re.sub(rf'\b{g}\b', '', clean_title, flags=re.IGNORECASE)
                  
                  # Replace dots, underscores, and hyphens with spaces
                  clean_title = re.sub(r'[\.\-\_]', ' ', clean_title)
                  
                  # Add spaces to CamelCase words
                  clean_title = re.sub(r'([a-z0-9])([A-Z])', r'\1 \2', clean_title)
                  
                  # Remove extra spaces and trim the ends
                  clean_title = re.sub(r'\s+', ' ', clean_title).strip()
                  
                  # 4. Construct the final perfect name
                  if prob_num:
                      new_name = f"{prob_num}. {clean_title}.java"
                  else:
                      new_name = f"{clean_title}.java"

                  # Apply the rename if it changed
                  if new_name != filename:
                      new_filepath = os.path.join(root, new_name)
                      print(f"RENAMING:\n  [OLD] {filename}\n  [NEW] {new_name}\n")
                      os.rename(filepath, new_filepath)
                      changes_made += 1
                  else:
                      print(f"SKIPPING (Already perfect): {filename}")

          print("-" * 40)
          print(f"Total files renamed: {changes_made}")
          EOF

      - name: Run Python Script
        run: python run_sort.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changes across the whole repo
          git add -A
          
          if git diff --staged --quiet; then
            echo "No changes to commit. Everything is already formatted."
          else
            git commit -m "style: aggressively normalize and format LeetCode filenames"
            git push origin ${{ github.ref_name }}
          fi
