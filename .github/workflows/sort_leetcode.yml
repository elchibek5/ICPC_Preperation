name: Auto Sort LeetCode Files
on:
  workflow_dispatch:

jobs:
  sort_and_rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Sorting Script
        run: |
          python -c '
          import os
          import re

          # Mapping of your unnumbered files to their exact LeetCode problem numbers
          problem_mapping = {
              "MergeKSortedLists.java": 23,
              "SudokuSolver.java": 37,
              "TrappingRainWater.java": 42,
              "N-Queens.java": 51,
              "LargestRectangleinHistogram.java": 84,
              "SlidingWindowMaximum.java": 239,
              "Find Median from Data Stream.java": 295,
              "ShortestSubarraywithSumatLeastK.java": 862,
              "VerticalOrderTraversalBinaryTree.java": 987
          }

          # Base target directory
          target_dir = "LeetCode_Problems/Java"

          if os.path.exists(target_dir):
              # os.walk scans the main directory AND all subfolders (easy, medium, hard)
              for root, dirs, files in os.walk(target_dir):
                  for filename in files:
                      if not filename.endswith(".java"):
                          continue

                      filepath = os.path.join(root, filename)
                      
                      # 1. Check if the file already starts with digits
                      match = re.match(r"^(\d+)\.(.*)", filename)
                      if match:
                          num_str = match.group(1)
                          rest_of_name = match.group(2).strip()
                          
                          new_num_str = num_str.zfill(4)
                          new_name = f"{new_num_str}. {rest_of_name}"
                          new_filepath = os.path.join(root, new_name)
                          
                          if filepath != new_filepath:
                              print(f"Renaming: {filepath} -> {new_filepath}")
                              os.rename(filepath, new_filepath)
                              
                      # 2. Match unnumbered files via the lookup table
                      elif filename in problem_mapping:
                          prob_num = problem_mapping[filename]
                          padded_num = str(prob_num).zfill(4)
                          new_name = f"{padded_num}. {filename}"
                          new_filepath = os.path.join(root, new_name)
                          
                          print(f"Renaming: {filepath} -> {new_filepath}")
                          os.rename(filepath, new_filepath)
          else:
              print(f"Directory {target_dir} not found!")
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LeetCode_Problems/Java/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "style: recursively sort LeetCode files in subfolders"
            git push
          fi
