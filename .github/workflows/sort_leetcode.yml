name: Auto Sort LeetCode Files
on:
  workflow_dispatch:

jobs:
  sort_and_rename:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # Forces Git to checkout the exact active branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Sorting Script
        run: |
          python -c '
          import os
          import re

          # Explicit mapping for unnumbered files
          problem_mapping = {
              "MergeKSortedLists.java": 23,
              "SudokuSolver.java": 37,
              "TrappingRainWater.java": 42,
              "N-Queens.java": 51,
              "LargestRectangleinHistogram.java": 84,
              "SlidingWindowMaximum.java": 239,
              "Find Median from Data Stream.java": 295,
              "ShortestSubarraywithSumatLeastK.java": 862,
              "VerticalOrderTraversalBinaryTree.java": 987,
              "AddTwoNumbers.java": 2,
              "Binary Tree ZigzagLevelOrderTraversal.java": 103,
              "BinaryTreeLevelOrderTraversal.java": 102,
              "BinaryTreeLevelOrderTraversal2.java": 107,
              "BinaryTreeRightSideView.java": 199,
              "CapacityToShipPackagesWithinDDays.java": 1011,
              "Combinations.java": 77,
              "ContainerWithMostWater.java": 11
          }

          def format_title(text):
              # 1. Add space before existing capital letters in CamelCase words
              text = re.sub(r"([a-z0-9])([A-Z])", r"\1 \2", text)
              # 2. Normalize multiple spaces into one single space
              return re.sub(r"\s+", " ", text).strip()

          target_dir = "LeetCode_Problems/Java"

          if os.path.exists(target_dir):
              # os.walk traverses all subdirectories (easy, medium, hard)
              for root, dirs, files in os.walk(target_dir):
                  for filename in files:
                      if not filename.endswith(".java"):
                          continue

                      filepath = os.path.join(root, filename)
                      base, ext = os.path.splitext(filename)
                      
                      prob_num = None
                      clean_title = base

                      # Case A: Matches manual mapping
                      if filename in problem_mapping:
                          prob_num = str(problem_mapping[filename]).zfill(4)
                          clean_title = os.path.splitext(filename)[0]

                      else:
                          # Case B: Look for any numbers in the filename
                          num_match = re.search(r"(\d+)", base)
                          if num_match:
                              extracted_num = num_match.group(1)
                              
                              # Avoid treating long numbers or years as LeetCode IDs
                              if len(extracted_num) <= 4:
                                  prob_num = extracted_num.zfill(4)
                                  
                                  # Remove the matched number and strip out messy prefixes
                                  remainder = base.replace(extracted_num, "", 1)
                                  scraps = [
                                      "Code Testcase Testcase Test Result",
                                      "Code Testcase Test Result", 
                                      ".", "-", "_"
                                  ]
                                  for scrap in scraps:
                                      remainder = remainder.replace(scrap, "")
                                  clean_title = remainder.strip()

                      # Fix any CamelCase spacing issues
                      spaced_title = format_title(clean_title)

                      # Rebuild the perfect filename
                      if prob_num:
                          new_name = f"{prob_num}. {spaced_title}{ext}"
                      else:
                          new_name = f"{spaced_title}{ext}"

                      # If the newly generated name is different, rename the file
                      if new_name != filename:
                          new_filepath = os.path.join(root, new_name)
                          print(f"Renaming: {filepath} -> {new_filepath}")
                          os.rename(filepath, new_filepath)
          else:
              print(f"Directory {target_dir} not found!")
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all modifications, additions, and deletions
          git add -A LeetCode_Problems/Java/
          
          # Force git status to recognize changes
          git status
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "style: recursively format and rename LeetCode files"
            git push origin ${{ github.ref_name }}
