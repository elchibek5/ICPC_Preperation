name: Generate Animated LeetCode Stats
on:
  push:
    branches:
      - main
    paths:
      - 'LeetCode_Problems/**'
  workflow_dispatch:

jobs:
  generate_svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create SVG Generator Script
        run: |
          cat << 'EOF' > generate_svg.py
          import os

          def count_java_files(folder):
              path = os.path.join("LeetCode_Problems/Java", folder)
              if not os.path.exists(path):
                  return 0
              return len([f for f in os.listdir(path) if f.endswith(".java")])

          easy = count_java_files("easy")
          medium = count_java_files("medium")
          hard = count_java_files("hard")
          total = easy + medium + hard

          if total == 0:
              total = 1 # Prevent division by zero

          # Calculate widths for the progress bars (Max width is 300px)
          easy_width = int((easy / total) * 300)
          medium_width = int((medium / total) * 300)
          hard_width = int((hard / total) * 300)

          # SVG Template with embedded CSS for beautiful load-in animations
          svg_content = f"""<svg width="500" height="250" viewBox="0 0 500 250" fill="none" xmlns="http://www.w3.org/2000/svg">
            <style>
              .bg {{ fill: #1A1B27; rx: 15px; }}
              .title {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 20px; fill: #A9B1D6; }}
              .total-text {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 800; font-size: 42px; fill: #7AA2F7; }}
              .total-label {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 12px; fill: #565F89; text-transform: uppercase; letter-spacing: 1px; }}
              .stat-label {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 13px; fill: #C0CAF5; }}
              .stat-value {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 13px; fill: #A9B1D6; }}
              
              /* Animations */
              @keyframes slideIn {{
                from {{ width: 0; opacity: 0; }}
                to {{ opacity: 1; }}
              }}
              @keyframes fadeIn {{
                from {{ opacity: 0; transform: translateY(10px); }}
                to {{ opacity: 1; transform: translateY(0); }}
              }}
              
              .bar-easy {{ animation: slideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }}
              .bar-medium {{ animation: slideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.2s; opacity: 0; }}
              .bar-hard {{ animation: slideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.4s; opacity: 0; }}
              .fade-text {{ animation: fadeIn 1s ease-out forwards 0.5s; opacity: 0; }}
            </style>

            <rect class="bg" width="500" height="250" stroke="#292E42" stroke-width="2"/>

            <text x="30" y="40" class="title">Algorithm Mastery</text>
            
            <g class="fade-text" transform="translate(30, 85)">
              <text x="0" y="0" class="total-text">{easy + medium + hard}</text>
              <text x="0" y="25" class="total-label">Problems Solved</text>
            </g>

            <g transform="translate(160, 60)">
              <text x="0" y="0" class="stat-label">Easy</text>
              <text x="300" y="0" class="stat-value" text-anchor="end">{easy}</text>
              <rect x="0" y="10" width="300" height="10" rx="5" fill="#292E42"/>
              <rect class="bar-easy" x="0" y="10" width="{easy_width}" height="10" rx="5" fill="#9ECE6A"/>
            </g>

            <g transform="translate(160, 115)">
              <text x="0" y="0" class="stat-label">Medium</text>
              <text x="300" y="0" class="stat-value" text-anchor="end">{medium}</text>
              <rect x="0" y="10" width="300" height="10" rx="5" fill="#292E42"/>
              <rect class="bar-medium" x="0" y="10" width="{medium_width}" height="10" rx="5" fill="#E0AF68"/>
            </g>

            <g transform="translate(160, 170)">
              <text x="0" y="0" class="stat-label">Hard</text>
              <text x="300" y="0" class="stat-value" text-anchor="end">{hard}</text>
              <rect x="0" y="10" width="300" height="10" rx="5" fill="#292E42"/>
              <rect class="bar-hard" x="0" y="10" width="{hard_width}" height="10" rx="5" fill="#F7768E"/>
            </g>
          </svg>
          """

          with open("leetcode-stats.svg", "w", encoding="utf-8") as f:
              f.write(svg_content)
          print("SVG generated successfully!")
          EOF

      - name: Run Script
        run: python generate_svg.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add the SVG just in case
          git add leetcode-stats.svg
          git status
          
          if git diff --staged --quiet; then
            echo "No stats changes to commit."
          else
            git commit -m "docs: generate animated LeetCode stats SVG"
            git push origin ${{ github.ref_name }}
          fi
