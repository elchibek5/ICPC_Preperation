name: Generate Animated LeetCode Stats
on:
  push:
    branches:
      - main
    paths:
      - 'LeetCode_Problems/**'
  workflow_dispatch:

jobs:
  generate_svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Create SVG Generator Script
        run: |
          cat << 'EOF' > generate_svg.py
          import os

          def count_java_files(folder):
              path = os.path.join("LeetCode_Problems/Java", folder)
              if not os.path.exists(path):
                  return 0
              return len([f for f in os.listdir(path) if f.endswith(".java")])

          easy = count_java_files("easy")
          medium = count_java_files("medium")
          hard = count_java_files("hard")
          total = easy + medium + hard
          if total == 0: total = 1

          easy_width = int((easy / total) * 300)
          medium_width = int((medium / total) * 300)
          hard_width = int((hard / total) * 300)

          # Notice the double braces {{ }} for CSS inside Python f-strings!
          svg_content = f"""<svg width="500" height="250" viewBox="0 0 500 250" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#0B0C10" />
                <stop offset="50%" stop-color="#1A1A2E" />
                <stop offset="100%" stop-color="#16213E" />
              </linearGradient>
              
              <linearGradient id="easy-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#00b09b" />
                <stop offset="100%" stop-color="#96c93d" />
              </linearGradient>
              <linearGradient id="med-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f7b733" />
                <stop offset="100%" stop-color="#fc4a1a" />
              </linearGradient>
              <linearGradient id="hard-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ed213a" />
                <stop offset="100%" stop-color="#93291e" />
              </linearGradient>

              <linearGradient id="meteor" x1="100%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
                <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
              </linearGradient>
            </defs>

            <style>
              .title {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 800; font-size: 22px; fill: #E94560; text-shadow: 0px 0px 10px rgba(233, 69, 96, 0.5); }}
              .total-text {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 800; font-size: 46px; fill: #FFFFFF; }}
              .total-label {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 12px; fill: #A0A5B5; text-transform: uppercase; letter-spacing: 2px; }}
              .stat-label {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 600; font-size: 14px; fill: #D1D5DB; }}
              .stat-value {{ font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 14px; fill: #FFFFFF; }}
              
              /* Load In Animation */
              @keyframes slideIn {{
                from {{ width: 0; opacity: 0; }}
                to {{ opacity: 1; }}
              }}
              
              /* Glowing Breathing Animation */
              @keyframes pulseGlow {{
                0% {{ filter: drop-shadow(0 0 2px rgba(255,255,255,0.2)); }}
                50% {{ filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }}
                100% {{ filter: drop-shadow(0 0 2px rgba(255,255,255,0.2)); }}
              }}

              /* Shooting Star Animation */
              @keyframes fall {{
                0% {{ transform: translate(400px, -100px); opacity: 1; }}
                100% {{ transform: translate(-200px, 400px); opacity: 0; }}
              }}
              
              /* Blinking Stars */
              @keyframes twinkle {{
                0%, 100% {{ opacity: 0.2; }}
                50% {{ opacity: 0.8; transform: scale(1.2); }}
              }}
              
              .bar-easy {{ animation: slideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards, pulseGlow 3s infinite alternate 1.5s; }}
              .bar-medium {{ animation: slideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.2s, pulseGlow 3s infinite alternate 1.7s; opacity: 0; }}
              .bar-hard {{ animation: slideIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards 0.4s, pulseGlow 3s infinite alternate 1.9s; opacity: 0; }}
              
              .meteor-1 {{ animation: fall 4s linear infinite; }}
              .meteor-2 {{ animation: fall 5s linear infinite 2s; }}
              .meteor-3 {{ animation: fall 6s linear infinite 1s; }}
              
              .star {{ animation: twinkle 3s infinite ease-in-out; }}
            </style>

            <rect width="500" height="250" rx="15" fill="url(#sky)" />

            <circle cx="50" cy="50" r="1" fill="#FFF" class="star" style="animation-delay: 0s;" />
            <circle cx="150" cy="30" r="1.5" fill="#FFF" class="star" style="animation-delay: 1s;" />
            <circle cx="350" cy="80" r="1" fill="#FFF" class="star" style="animation-delay: 0.5s;" />
            <circle cx="450" cy="40" r="2" fill="#FFF" class="star" style="animation-delay: 1.5s;" />
            <circle cx="80" cy="200" r="1" fill="#FFF" class="star" style="animation-delay: 0.2s;" />

            <g class="meteor-1"><line x1="0" y1="0" x2="-40" y2="40" stroke="url(#meteor)" stroke-width="2" stroke-linecap="round"/></g>
            <g class="meteor-2"><line x1="0" y1="0" x2="-60" y2="60" stroke="url(#meteor)" stroke-width="1.5" stroke-linecap="round"/></g>
            <g class="meteor-3"><line x1="0" y1="0" x2="-30" y2="30" stroke="url(#meteor)" stroke-width="2.5" stroke-linecap="round"/></g>

            <text x="35" y="45" class="title">Algorithm Mastery</text>
            
            <g transform="translate(35, 110)">
              <text x="0" y="0" class="total-text">{easy + medium + hard}</text>
              <text x="0" y="25" class="total-label">Problems Solved</text>
            </g>

            <g transform="translate(170, 70)">
              <text x="0" y="0" class="stat-label">Easy</text>
              <text x="290" y="0" class="stat-value" text-anchor="end">{easy}</text>
              <rect x="0" y="12" width="290" height="8" rx="4" fill="#0B0C10" stroke="#1A1A2E"/>
              <rect class="bar-easy" x="0" y="12" width="{easy_width}" height="8" rx="4" fill="url(#easy-grad)"/>
            </g>

            <g transform="translate(170, 130)">
              <text x="0" y="0" class="stat-label">Medium</text>
              <text x="290" y="0" class="stat-value" text-anchor="end">{medium}</text>
              <rect x="0" y="12" width="290" height="8" rx="4" fill="#0B0C10" stroke="#1A1A2E"/>
              <rect class="bar-medium" x="0" y="12" width="{medium_width}" height="8" rx="4" fill="url(#med-grad)"/>
            </g>

            <g transform="translate(170, 190)">
              <text x="0" y="0" class="stat-label">Hard</text>
              <text x="290" y="0" class="stat-value" text-anchor="end">{hard}</text>
              <rect x="0" y="12" width="290" height="8" rx="4" fill="#0B0C10" stroke="#1A1A2E"/>
              <rect class="bar-hard" x="0" y="12" width="{hard_width}" height="8" rx="4" fill="url(#hard-grad)"/>
            </g>
          </svg>
          """

          with open("leetcode-stats.svg", "w", encoding="utf-8") as f:
              f.write(svg_content)
          EOF
