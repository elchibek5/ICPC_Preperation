<svg width="500" height="250" viewBox="0 0 500 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blood-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a0000" />
      <stop offset="50%" stop-color="#8a0303" />
      <stop offset="100%" stop-color="#ff0000" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .gothic { font-family: 'Times New Roman', serif; font-weight: 900; }
    .typewriter { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    
    /* Animations */
    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; text-shadow: 0 0 8px #ff0000; }
      20%, 22%, 24%, 55% { opacity: 0; text-shadow: none; }
    }
    
    @keyframes heartbeat {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
      14% { transform: scale(1.05); filter: drop-shadow(0 0 10px #ff0000); }
      28% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
      42% { transform: scale(1.05); filter: drop-shadow(0 0 10px #ff0000); }
      70% { transform: scale(1); filter: drop-shadow(0 0 2px #ff0000); }
    }

    @keyframes inkBleed {
      from { width: 0; opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes typeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .flicker-text { animation: flicker 4s infinite; fill: #d40000; }
    .pulse-number { transform-origin: 30px 180px; animation: heartbeat 2s infinite; fill: #ffffff; }
    
    .rule-text { fill: #888888; font-size: 9px; opacity: 0; animation: typeIn 1s forwards; }
    
    .ink-easy { animation: inkBleed 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards 1s; opacity: 0; }
    .ink-medium { animation: inkBleed 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards 1.3s; opacity: 0; }
    .ink-hard { animation: inkBleed 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards 1.6s; opacity: 0; }
  </style>

  <rect width="500" height="250" fill="#030303" />

  <text x="250" y="220" class="gothic" font-size="200" fill="#0a0a0a" text-anchor="middle" font-style="italic">L.C.</text>

  <text x="25" y="45" class="gothic flicker-text" font-size="28" letter-spacing="2">LEETCODE NOTE</text>
  
  <text x="25" y="70" class="typewriter rule-text" style="animation-delay: 0.2s;" fill="#ffffff">How to use it:</text>
  <text x="25" y="85" class="typewriter rule-text" style="animation-delay: 0.5s;">The problem whose algorithm is</text>
  <text x="25" y="98" class="typewriter rule-text" style="animation-delay: 0.7s;">written in this repository</text>
  <text x="25" y="111" class="typewriter rule-text" style="animation-delay: 0.9s;">shall be solved.</text>

  <g transform="translate(25, 160)">
    <text x="0" y="0" class="typewriter" font-size="12" fill="#d40000" filter="url(#glow)">TOTAL ELIMINATED</text>
    <text x="0" y="45" class="gothic pulse-number" font-size="52">177</text>
  </g>

  <line x1="200" y1="30" x2="200" y2="220" stroke="#1a0000" stroke-width="2" />

  <g transform="translate(220, 50)">
    <text x="0" y="0" class="gothic" font-size="14" fill="#a0a0a0">Casualties (Easy)</text>
    <text x="260" y="0" class="typewriter" font-size="14" fill="#ffffff" text-anchor="end">88</text>
    <rect x="0" y="10" width="260" height="6" fill="#111111" />
    <rect class="ink-easy" x="0" y="10" width="129" height="6" fill="#008a3e" />
  </g>

  <g transform="translate(220, 110)">
    <text x="0" y="0" class="gothic" font-size="14" fill="#a0a0a0">Targets (Medium)</text>
    <text x="260" y="0" class="typewriter" font-size="14" fill="#ffffff" text-anchor="end">74</text>
    <rect x="0" y="10" width="260" height="6" fill="#111111" />
    <rect class="ink-medium" x="0" y="10" width="108" height="6" fill="#d47900" />
  </g>

  <g transform="translate(220, 170)">
    <text x="0" y="0" class="gothic" font-size="14" fill="#a0a0a0">Special Grade (Hard)</text>
    <text x="260" y="0" class="typewriter" font-size="14" fill="#ffffff" text-anchor="end">15</text>
    <rect x="0" y="10" width="260" height="6" fill="#111111" />
    <rect class="ink-hard" x="0" y="10" width="22" height="6" fill="url(#blood-gradient)" filter="url(#glow)"/>
  </g>

</svg>
